  <text x="470" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">AppCoordinator</text>
  <text x="470" y="126" text-anchor="middle" font-size="11.5" fill="#534AB7">root · app lifetime</text>

