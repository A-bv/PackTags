    <rect x="150" y="446" width="210" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD"/><text x="255" y="469" text-anchor="middle" font-size="12.5" fill="#042C53">Onboarding</text>
    <rect x="150" y="490" width="210" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD"/><text x="255" y="513" text-anchor="middle" font-size="12.5" fill="#042C53">QuantityPicker</text>
