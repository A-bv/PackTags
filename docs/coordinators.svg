<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7a7a74"/></marker>
  </defs>

  <rect x="0.5" y="0.5" width="939" height="559" rx="14" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="40" y="42" font-size="19" font-weight="600" fill="#1a1a1a">Coordinator tree</text>
  <text x="40" y="64" font-size="13" fill="#666">Coordinators own every navigation decision; view controllers never present each other.</text>
  <text x="900" y="545" text-anchor="end" font-size="11" fill="#aaa">Updated 2026-06-15</text>

  <!-- legend -->
