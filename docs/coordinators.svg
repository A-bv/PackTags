  <rect x="730" y="30" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#378ADD"/><text x="750" y="42" font-size="11.5" fill="#555">UIKit</text>
  <rect x="800" y="30" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#1D9E75"/><text x="820" y="42" font-size="11.5" fill="#555">SwiftUI</text>

  <!-- root -->
