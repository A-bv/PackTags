  <text x="710" y="217" text-anchor="middle" font-size="13.5" font-weight="600" fill="#26215C">ConnectedInsightsCoordinator</text>

  <g stroke="#7a7a74" stroke-width="1.6" fill="none">
    <path d="M430 136 C360 165, 300 160, 245 186" marker-end="url(#a)"/>
    <path d="M512 136 C600 165, 660 160, 706 186" marker-end="url(#a)"/>
