    <rect x="610" y="314" width="240" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD"/><text x="730" y="337" text-anchor="middle" font-size="12.5" fill="#042C53">InfoSetupIGCreatorVC</text>
